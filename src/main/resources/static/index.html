<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>미드나잇 맨즈</title>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/community-board.css">
</head>
<body>
    <header class="header">
        <div class="header-container">
            <a href="index.html" class="logo">
                <h1>미드나잇 맨즈</h1>
            </a>
            <nav class="nav" id="navigation">
                <div class="nav-guest" id="nav-guest">
                    <a href="login.html" class="btn btn-outline btn-sm">로그인</a>
                    <a href="register.html" class="btn btn-primary btn-sm">회원가입</a>
                </div>
                <div class="nav-user hidden" id="nav-user">
                    <span class="user-nickname" id="user-nickname"></span>
                    <a href="my-page.html" class="btn btn-outline btn-sm">마이페이지</a>
                    <a href="bookmarks.html" class="btn btn-outline btn-sm">북마크</a>
                    <a href="create-post.html" class="btn btn-primary btn-sm">글쓰기</a>
                    <a href="admin.html" class="btn btn-secondary btn-sm hidden" id="admin-link">관리자</a>
                    <button class="btn btn-outline btn-sm" id="logout-btn">로그아웃</button>
                </div>
            </nav>
        </div>
    </header>

    <main class="main-content">
        <div class="container">
            <div id="sub_center" class="community-board">
                <div class="board-head-line"></div>
                <div class="board-title-wrap">
                    <h2>
                        <span>밤문화이야기</span>
                    </h2>
                </div>
                <div class="board-intro">
                    <p>
                        지금 <span>유흥업소에 관한 핫이슈나 꼭 알아두어야할 정보</span>들을 올리는곳입니다.<br>
                        다른곳에서 말할수 없는 정보들을 우리 미드나잇 맨즈에서 많이 얻어갈수 있도록 서로서로 공유합시다.
                    </p>
                </div>
            </div>

            <div class="board-toolbar">
                <button id="filter-btn" class="filter-btn" type="button">필터</button>
                <a href="create-post.html" class="btn btn-primary btn-sm">글쓰기</a>
            </div>

            <div id="filter-modal" class="filter-modal hidden">
                <div class="filter-modal-content">
                    <button id="filter-close" class="filter-close" type="button">×</button>
                    <h3>필터 설정</h3>
                    <div class="filter-item">
                        <span>광고 글 보기</span>
                        <input type="checkbox" id="ad-switch">
                    </div>
                    <div class="filter-item">
                        <span>추천 글 우선 보기</span>
                        <input type="checkbox" id="hot-switch" checked>
                    </div>
                </div>
            </div>

            <table class="board-table-header" cellspacing="0">
                <tr>
                    <th>번호</th>
                    <th>제목</th>
                    <th>등록인</th>
                    <th>등록일</th>
                    <th>추천</th>
                    <th>조회수</th>
                </tr>
            </table>

            <table class="board-table" cellspacing="0">
                <tbody id="notice-list"></tbody>
                <tbody id="post-list"></tbody>
            </table>

            <div class="loading hidden" id="loading">
                <div class="spinner"></div>
                <p>게시글을 불러오는 중...</p>
            </div>

            <div class="error-banner hidden" id="error-banner">
                <p id="error-message"></p>
                <button class="btn btn-sm btn-primary" id="retry-btn">다시 시도</button>
            </div>

            <div class="empty-state hidden" id="empty-state">
                <h3>아직 게시글이 없습니다</h3>
                <p>첫 번째 글을 작성해보세요!</p>
                <a href="create-post.html" class="btn btn-primary">글쓰기</a>
            </div>

            <div class="pagination hidden" id="pagination">
                <button class="btn btn-outline btn-sm" id="prev-btn" disabled>이전</button>
                <div class="page-numbers" id="page-numbers"></div>
                <button class="btn btn-outline btn-sm" id="next-btn">다음</button>
            </div>
        </div>
    </main>

    <script src="js/utils/constants.js"></script>
    <script src="js/utils/helpers.js"></script>
    <script src="js/utils/auth.js"></script>
    <script src="js/api/apiClient.js"></script>
    <script src="js/api/authAPI.js"></script>
    <script src="js/api/postAPI.js"></script>
    <script src="js/components/postCard.js"></script>
    <script src="js/components/pagination.js"></script>
    <script src="js/pages/home.js"></script>
</body>
</html>
